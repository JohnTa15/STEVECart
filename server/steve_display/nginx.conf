# master worker auto in order to create each worker for every cpu core
worker_processes auto;


events{
    # each worker can handle 1024 connections
    worker_connections 1024;
    # accepting all connections in order to minimize latency and huge load
    multi_accept on;
}

http {    
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    charset utf-8;

    access_log /var/log/nginx/access.log;
    error_log /dev/stderr warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000; 

    gzip on; 
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_vary on;
    gzip_types text/plain text/css text/js text/xml text/javascript application/javascript application/json application/xml application/xml+rss;  

    server {
        listen 5173;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
