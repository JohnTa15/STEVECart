[agent]
  interval = "5s"
  round_interval = true
  flush_interval = "5s"
  omit_hostname = true

# ===== Input plugin: MQTT Consumer =====
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"] #tcp://192.168.136.11:1883
  topics = ["sensors/#"]
  client_id = "" #auto generated id.. 
  username = "admin"
  password = "adminUNIWA"
  qos = 0
  connection_timeout = "30s"
  persistent_session = false
  data_format = "json_v2"
  name_override = "cart_metrics"

 # Simplyfying the whole received message in order to capture the cart_id as a tag
  [[inputs.mqtt_consumer.json_v2]]
    [[inputs.mqtt_consumer.json_v2.object]]
      path = "@this"
      disable_prepend_keys = true
      tags = ["cart_id"]

# Promote cart_id from field to tag, so Flux queries can filter r["cart_id"]
# In order to finding faster the tag instead of reading the whole records..  
[[processors.converter]]
  [processors.converter.fields]
    tag = ["cart_id"]

# ===== Output plugin: InfluxDB v2 =====
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"] #http://192.168.136.11:8085
  token = "adminUNIWAsuper"  
  organization = "UNIWA"
  bucket = "sensors"